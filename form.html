<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Form</title>
  <link rel="stylesheet" href="css/style.css"/>

</head>
<body>
<!-- <form action="" method="post"> Connect to formspree.io -->
    <form
        action="https://formspree.io/f/xvzwlveq"
        method="POST"
        >
        <fieldset>
            <legend>Form</legend>
            <label for="first-name">First Name: (required)</label>
            <input type="text" id="first-name" name="first-name" required>

            <label for="last-name">Last Name: (required)</label>
            <input type="text" id="last-name" name="last-name" required>

            <label for="car-type">Car Used for Pickup</label>
            <select id="car-type" name="car-type">
                <option value="Subaru">Subaru</option>
                <option value="Honda">Honda</option>
                <option value="Jeep">Jeep</option>
                <option value="Toyota">Toyota</option>
                <option value="Nissan">Nissan</option>
                <option value="Ford">Ford</option>
                <option value="Chevrolet">Chevrolet</option>
                <option value="Hyundai">Hyundai</option>
                <option value="Kia">Kia</option>
                <option value="Volkswagen">Volkswagen</option>
            </select>
        </fieldset><br>

            <fieldset>
                <legend>Available Time for Picking Up Grocery:</legend>
                <!-- <div class="radio-group"> -->
                    <div>
                        <input type="radio" id="morning" name="available-time-morning" value="morning">
                        <label for="morning">Morning</label>
                    </div>
                    <div>
                        <input type="radio" id="afternoon" name="available-time-afternoon value="afternoon">
                        <label for="afternoon">Afternoon</label>
                    </div>
                    <div>
                        <input type="radio" id="evening" name="available-time-evening" value="evening">
                        <label for="evening">Evening</label>
                    </div>
                    <div>
                        <input type="radio" id="weekend" name="available-time-weekend" value="weekend">
                        <label for="weekend">Weekend</label>
                    </div>
                <!-- </div> -->

            <input type="submit" value="Submit">
        </fieldset>
    </form>
</body>
</html>
